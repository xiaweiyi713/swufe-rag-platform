<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>西财教务证据台</title>
  <style>
    :root{font-family:"Noto Sans SC","Source Han Sans SC","Microsoft YaHei",sans-serif;color:#19362f;background:#f3f2e9;--ink:#19362f;--green:#075e48;--line:#cbd8cf;--paper:#fffefa;--wash:#e5f1e9;--muted:#61726b;--amber:#8a5a12}
    *{box-sizing:border-box}body{margin:0}.top{height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(16px,3vw,34px);border-bottom:1px solid var(--line);background:var(--paper)}
    .brand{font-weight:800;letter-spacing:.02em}.brand b{margin-right:12px;padding:6px 8px;color:#f9fff9;background:var(--green);font-size:10px;letter-spacing:.14em}.state,.hint{font-size:12px;line-height:1.65;color:var(--muted)}
    main{min-height:calc(100vh - 64px);display:grid;grid-template-columns:270px minmax(440px,1fr) 330px}.side{padding:26px 22px;background:var(--paper)}.left{border-right:1px solid var(--line)}.right{border-left:1px solid var(--line)}
    h1{margin:0 0 10px;font:600 27px/1.28 SimSun,"Songti SC",serif}label{display:block;margin:18px 0 6px;font-size:12px;font-weight:750}select,input{width:100%;padding:10px;border:1px solid var(--line);border-radius:0;background:#fff;color:var(--ink)}input:focus,select:focus,textarea:focus,button:focus-visible{outline:2px solid #2e8b70;outline-offset:2px}.key{margin-top:24px;padding-top:2px;border-top:1px solid var(--line)}.key small{float:right;color:var(--green)}
    .chat{display:flex;min-height:0;flex-direction:column}.messages{flex:1;min-height:68vh;overflow:auto;padding:28px clamp(18px,3vw,42px)}.msg{max-width:850px;margin:0 0 18px;padding:16px 18px;border:1px solid var(--line);background:var(--paper);font-size:14px;line-height:1.72}.msg.user{max-width:720px;margin-left:auto;background:var(--wash)}.meta{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px;font-size:11px;font-weight:750}.badge{padding:3px 7px;color:var(--green);background:#dbeee3}.badge.warn{color:var(--amber);background:#f5ead6}.trace{display:flex;flex-wrap:wrap;gap:5px 12px;margin-top:13px;padding-top:10px;border-top:1px dashed var(--line);font-size:11px;color:var(--muted)}
    .answer p{margin:.4em 0 1em}.answer h3{margin:1.35em 0 .55em;font-size:15px}.answer ul{margin:.4em 0 1em;padding-left:1.4em}.answer blockquote{margin:1em 0;padding:9px 12px;border-left:3px solid #76a991;background:#eef5ef;color:#435b52}.answer strong{font-weight:800}.table-wrap{max-width:100%;overflow:auto;margin:.7em 0 1.3em}.answer table{width:100%;border-collapse:collapse;font-size:12px}.answer th,.answer td{padding:7px 8px;border:1px solid var(--line);text-align:left;white-space:nowrap}.answer th{background:#edf3ee}.answer td:nth-child(3),.answer th:nth-child(3){text-align:right}
    form{margin:0 clamp(18px,3vw,42px) 24px;border:1px solid #8faa9d;background:#fff}textarea{width:100%;min-height:98px;padding:15px;border:0;resize:vertical;font:14px/1.65 inherit}form>div{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-top:1px solid #edf0eb}button{padding:8px 20px;border:0;border-radius:0;color:#fff;background:var(--green);cursor:pointer}button:disabled{opacity:.5}
    .source{width:100%;margin:0 0 10px;padding:12px;border:1px solid var(--line);background:#fff;color:var(--ink);text-align:left}.source-open{width:100%;padding:0;background:transparent;color:var(--ink);text-align:left}.source strong,.source span{display:block}.source span{margin-top:5px;font-size:10px;color:var(--muted)}.source-actions{display:flex;gap:12px;margin-top:9px}.source-actions a,.answer a{color:var(--green);font-size:11px;text-decoration:underline;text-underline-offset:2px}pre{max-height:310px;overflow:auto;white-space:pre-wrap;font:11px/1.6 inherit}.detail a{margin-right:10px;color:var(--green);font-size:11px}
    @media(max-width:1040px){main{grid-template-columns:230px 1fr}.right{grid-column:1/-1;border:0;border-top:1px solid var(--line)}}@media(max-width:700px){main{display:block}.left{border:0;border-bottom:1px solid var(--line)}h1,.intro{display:none}.messages{min-height:50vh;padding:16px}form{margin:0 16px 18px}.right{display:none}}
    @media(prefers-reduced-motion:reduce){*{scroll-behavior:auto!important}}
  </style>
</head>
<body>
  <header class="top"><div class="brand"><b>SWUFE</b>教务证据台</div><div class="state" id="globalState">正在核对生产知识库…</div></header>
  <main>
    <aside class="side left">
      <h1>先理解问题，<br>再查询可信事实。</h1>
      <p class="hint intro">课程明细由结构化数据库计算；制度条款由 RAG 检索；模型只理解语义、解释经过校验的证据。</p>
      <label for="college">学院（可选）</label><select id="college"><option value="">自动识别</option></select>
      <label for="cohort">入学年级（可选）</label><select id="cohort"><option value="">自动识别</option></select>
      <section class="key"><label for="apiKey">DeepSeek API Key <small>仅本次请求</small></label><input id="apiKey" name="api_key" form="form" type="password" autocomplete="new-password" placeholder="sk-…" required><p class="hint">密钥不写入配置或浏览器存储。正式提问默认经过模型理解与模型表达，并对输出做事实校验。</p></section>
    </aside>
    <section class="chat">
      <div class="messages" id="messages"><article class="msg"><div class="meta"><span>教务助手</span><b class="badge">准备就绪</b></div><div class="answer"><p>可以试问：23级会计学第一学期有哪些课？人工智能23级大三下有哪些选修课？2023级公共外语要修多少学分？</p></div></article></div>
      <form id="form"><textarea id="question" maxlength="2000" placeholder="输入问题；Enter 发送，Shift+Enter 换行" required></textarea><div><span class="state" id="status">等待提问</span><button type="submit">发送</button></div></form>
    </section>
    <aside class="side right"><div class="meta"><strong>原文件与页码</strong><span id="sourceCount">0</span></div><div id="sources" class="hint">通过校验的引用会显示在这里。</div><div id="detail" class="detail"></div></aside>
  </main>
  <script>
    const $=id=>document.getElementById(id);const sid=sessionStorage.getItem("swufe-query-session")||crypto.randomUUID();sessionStorage.setItem("swufe-query-session",sid);
    async function api(path,options={}){const response=await fetch(path,{...options,headers:{"Content-Type":"application/json",...(options.headers||{})}});const payload=await response.json().catch(()=>({}));if(!response.ok)throw new Error(payload.detail||`HTTP ${response.status}`);return payload}
    function inline(host,text){const parts=text.split(/(\*\*[^*]+\*\*|\[[^\]]+\]\((?:https?:\/\/|\/)[^)]+\))/g);for(const part of parts){if(part.startsWith("**")&&part.endsWith("**")){const strong=document.createElement("strong");strong.textContent=part.slice(2,-2);host.append(strong)}else{const link=part.match(/^\[([^\]]+)\]\(((?:https?:\/\/|\/)[^)]+)\)$/);if(link){const anchor=document.createElement("a");anchor.textContent=link[1];anchor.href=link[2];anchor.target="_blank";anchor.rel="noopener";host.append(anchor)}else host.append(document.createTextNode(part))}}}
    function renderMarkdown(host,text){host.replaceChildren();const lines=String(text||"").replace(/\r/g,"").split("\n");for(let i=0;i<lines.length;){const line=lines[i].trim();if(!line){i++;continue}if(line.startsWith("|")&&i+1<lines.length&&/^\|?[\s:|-]+\|?$/.test(lines[i+1].trim())){const wrap=document.createElement("div"),table=document.createElement("table"),head=document.createElement("thead"),body=document.createElement("tbody");wrap.className="table-wrap";const rows=[];while(i<lines.length&&lines[i].trim().startsWith("|")){rows.push(lines[i].trim().slice(1,-1).split("|").map(x=>x.trim()));i++}const header=document.createElement("tr");for(const value of rows[0]){const th=document.createElement("th");inline(th,value);header.append(th)}head.append(header);for(const values of rows.slice(2)){const tr=document.createElement("tr");for(const value of values){const td=document.createElement("td");inline(td,value);tr.append(td)}body.append(tr)}table.append(head,body);wrap.append(table);host.append(wrap);continue}if(/^###\s+/.test(line)){const h=document.createElement("h3");inline(h,line.replace(/^###\s+/,""));host.append(h);i++;continue}if(line.startsWith(">")){const q=document.createElement("blockquote");inline(q,line.replace(/^>\s?/,""));host.append(q);i++;continue}if(/^[-*]\s+/.test(line)){const ul=document.createElement("ul");while(i<lines.length&&/^[-*]\s+/.test(lines[i].trim())){const li=document.createElement("li");inline(li,lines[i].trim().replace(/^[-*]\s+/,""));ul.append(li);i++}host.append(ul);continue}const p=document.createElement("p");const values=[line];i++;while(i<lines.length&&lines[i].trim()&&!/^###\s+|^>\s?|^[-*]\s+|^\|/.test(lines[i].trim())){values.push(lines[i].trim());i++}inline(p,values.join(" "));host.append(p)}}
    function outputState(p){if(p.refused||p.final_output_source==="insufficient")return["证据不足","warn"];if(p.final_output_source==="llm")return["模型表达 · 校验通过",""];if(p.final_output_source==="clarification")return["需要补充信息","warn"];return["程序整理 · 校验通过",""]}
    function assistantMessage(text,p){const article=document.createElement("article");article.className="msg";const meta=document.createElement("div"),name=document.createElement("span"),badge=document.createElement("b");meta.className="meta";name.textContent="教务助手";const state=outputState(p);badge.className=`badge ${state[1]}`;badge.textContent=state[0];meta.append(name,badge);const answer=document.createElement("div");answer.className="answer";renderMarkdown(answer,text);article.append(meta,answer);const trace=document.createElement("div");trace.className="trace";const planner=p.planner_llm?.called?"LLM理解":"规则理解";const presenter=p.presenter_llm?.accepted?"LLM表达通过":p.presenter_llm?.called?"LLM表达未通过，程序接管":"程序表达";const operations=(p.execution?.operations||[]).join(" → ")||p.execution_path||"—";for(const value of [`问题理解：${planner}`,`事实工具：${operations}`,`最终表达：${presenter}`,`校验：${p.validation?.passed?"通过":"未通过"}`,`${p.latency_ms} ms`]){const span=document.createElement("span");span.textContent=value;trace.append(span)}article.append(trace);$("messages").append(article);article.scrollIntoView({behavior:"smooth",block:"end"})}
    const baseAssistantMessage=assistantMessage;
    assistantMessage=(text,p)=>{if(p.final_output_source==="llm")p.presenter_llm={...(p.presenter_llm||{}),accepted:true};return baseAssistantMessage(text,p)};
    function userMessage(text){const article=document.createElement("article");article.className="msg user";const meta=document.createElement("div");meta.className="meta";const a=document.createElement("span"),b=document.createElement("b");a.textContent="你";b.className="badge";b.textContent="已发送";meta.append(a,b);const body=document.createElement("div");body.textContent=text;article.append(meta,body);$("messages").append(article)}
    function sourcePage(c){if(c.physical_page)return `原文件第${c.physical_page}页`;const match=String(c.article||"").match(/(?:原文件)?第\s*(\d+)\s*页/);return match?`原文件第${match[1]}页`:c.article||"页码未标注"}
    function renderSources(p){const host=$("sources");host.replaceChildren();for(const c of p.citations||[]){const card=document.createElement("div"),button=document.createElement("button"),actions=document.createElement("div");card.className="source";button.className="source-open";actions.className="source-actions";const title=document.createElement("strong"),meta=document.createElement("span");title.textContent=`[${c.marker}] ${c.doc_title}`;meta.textContent=`${sourcePage(c)} · ${c.chunk_id}`;button.append(title,meta);button.onclick=()=>loadSource(c.chunk_id);if(c.page_url){const page=document.createElement("a");page.href=c.page_url;page.target="_blank";page.rel="noopener";page.textContent=`打开${sourcePage(c)}`;actions.append(page)}if(c.file_url){const file=document.createElement("a");file.href=c.file_url;file.target="_blank";file.rel="noopener";file.textContent="下载原文件";actions.append(file)}card.append(button,actions);host.append(card)}$("sourceCount").textContent=String((p.citations||[]).length);if(!(p.citations||[]).length)host.textContent="本轮没有通过校验的引用。"}
    async function loadSource(id){const source=await api(`/source/${encodeURIComponent(id)}`);const host=$("detail");host.replaceChildren();const h=document.createElement("h3"),p=document.createElement("p"),pre=document.createElement("pre"),page=document.createElement("a"),file=document.createElement("a");h.textContent=source.doc_title;p.className="hint";p.textContent=`${source.article} · ${source.cohort}`;pre.textContent=source.text;page.href=source.page_url;page.target="_blank";page.rel="noopener";page.textContent="打开对应页 →";file.href=source.file_url;file.target="_blank";file.rel="noopener";file.textContent="下载原文件 →";host.append(h,p,pre,page,file)}
    async function boot(){try{const o=await api("/options");for(const v of o.colleges||[])$("college").append(new Option(v,v));for(const v of o.cohorts||[])$("cohort").append(new Option(v,v));$("globalState").textContent=`${o.chunk_count} 知识块 · ${o.primary_course_offerings||0} 课程记录 · ${o.structured_plans||0} 专业方案`}catch(error){$("globalState").textContent=`知识库未就绪：${error.message}`}}
    $("form").onsubmit=async event=>{event.preventDefault();const question=$("question").value.trim();if(!question)return;userMessage(question);$("question").value="";const button=event.currentTarget.querySelector("button");button.disabled=true;$("status").textContent="正在理解条件、查询事实并校验回答…";try{const key=$("apiKey").value.trim();const payload=await api("/ask",{method:"POST",headers:key?{"X-LLM-API-Key":key}:{},body:JSON.stringify({question,college:$("college").value||null,cohort:$("cohort").value||null,session_id:sid})});assistantMessage(payload.answer_md,payload);renderSources(payload);$("status").textContent=`完成 · ${outputState(payload)[0]}`}catch(error){$("status").textContent=`失败：${error.message}`}finally{button.disabled=false;$("question").focus()}};
    $("question").onkeydown=event=>{if(event.key==="Enter"&&!event.shiftKey){event.preventDefault();$("form").requestSubmit()}};window.addEventListener("pagehide",()=>$("apiKey").value="");boot();
  </script>
</body>
</html>
