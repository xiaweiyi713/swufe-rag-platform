paths:
  chunks: data/chunks.jsonl
  artifacts: artifacts

retrieval:
  embed_model: BAAI/bge-large-zh-v1.5
  query_prefix: "为这个句子生成表示以用于检索相关文章："
  top_k: 5
  candidate_k: 20
  rrf_k: 60
  use_bm25: true

generation:
  llm: deepseek-chat
  temperature: 0
  refuse_th: 0.35
  max_retries: 2
  request_timeout_seconds: 60

