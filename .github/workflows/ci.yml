name: monorepo-ci

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
            backend/requirements-ingest.txt
            backend/requirements-web.txt
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt -r requirements-web.txt
      - name: Compile sources
        run: python -m compileall -q contracts.py retrieval generation app eval swufe_rag academic_audit storage scripts tests
      - name: Build generated academic database
        run: python -m scripts.rebuild_academic_database_v2
      - name: Verify deterministic Tier 1 source slice
        run: |
          python -m scripts.build_tier1_dataset
          git diff --exit-code -- repro/tier1/chunks.jsonl repro/tier1/sources.csv repro/tier1/manifest.json
      - name: Run full pytest suite
        env:
          PYTHONUTF8: "1"
          HF_HUB_OFFLINE: "1"
          TRANSFORMERS_OFFLINE: "1"
        run: python -m pytest -q

  container:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Validate canonical Compose configuration
        run: docker compose --env-file deploy/.env.example --profile production config --quiet
      - name: Build production image
        run: docker build --tag swufe-rag:ci .

  crawler-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile crawler sources
        run: python -m compileall -q swufe-crawler
