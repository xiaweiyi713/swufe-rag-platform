name: offline-contract-tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install lightweight offline test dependency
        run: python -m pip install "numpy>=1.26,<3"
      - name: Compile sources
        run: python -m compileall -q contracts.py retrieval generation tests
      - name: Run offline contract suite
        env:
          PYTHONUTF8: "1"
        run: python -m unittest discover -s . -p "test*.py" -v

