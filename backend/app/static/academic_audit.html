<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>西财培养方案审计台</title>
  <style>
    :root {
      --ink: oklch(25% .025 165); --muted: oklch(49% .025 165);
      --paper: oklch(97% .012 95); --panel: oklch(99% .006 95);
      --line: oklch(88% .018 155); --green: oklch(39% .09 165);
      --green-soft: oklch(92% .035 160); --amber: oklch(55% .12 63);
      font-family: Aptos, "Noto Sans SC", "Microsoft YaHei", sans-serif;
      color: var(--ink); background: var(--paper);
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; }
    button, select, textarea { font: inherit; }
    button, select, textarea { border-radius: 0; }
    button:focus-visible, select:focus-visible, textarea:focus-visible {
      outline: 3px solid oklch(72% .11 155 / .45); outline-offset: 2px;
    }
    header { min-height: 74px; padding: 0 clamp(20px, 4vw, 56px); display: flex;
      align-items: center; justify-content: space-between; border-bottom: 1px solid var(--line);
      background: var(--panel); }
    .brand { display: flex; align-items: baseline; gap: 14px; }
    .brand b { padding: 7px 9px; color: var(--panel); background: var(--green);
      font-size: 11px; letter-spacing: .17em; }
    .brand strong { font-family: Georgia, "Songti SC", serif; font-size: 20px; font-weight: 500; }
    header a { color: var(--green); font-size: 13px; text-decoration: none; }
    main { min-height: calc(100vh - 74px); display: grid; grid-template-columns: minmax(330px, 420px) 1fr; }
    .input-pane { padding: clamp(28px, 4vw, 52px); border-right: 1px solid var(--line); background: var(--panel); }
    .eyebrow { margin: 0 0 12px; color: var(--green); font-size: 11px; font-weight: 800;
      letter-spacing: .17em; text-transform: uppercase; }
    h1 { margin: 0; max-width: 10em; font: 500 clamp(28px, 3vw, 42px)/1.13 Georgia, "Songti SC", serif; }
    .lede { margin: 18px 0 30px; max-width: 34em; color: var(--muted); font-size: 13px; line-height: 1.75; }
    .pair { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    label { display: block; margin: 17px 0 7px; font-size: 12px; font-weight: 750; }
    select, textarea { width: 100%; border: 1px solid var(--line); color: var(--ink); background: var(--panel); }
    select { min-height: 43px; padding: 9px 11px; }
    textarea { padding: 12px; resize: vertical; line-height: 1.55; }
    .hint { display: block; margin-top: 7px; color: var(--muted); font-size: 11px; line-height: 1.55; }
    .submit-row { margin-top: 24px; display: flex; align-items: center; gap: 14px; }
    .submit-row button { min-width: 138px; padding: 12px 18px; border: 0; color: var(--panel);
      background: var(--green); font-weight: 750; cursor: pointer; }
    .submit-row button:disabled { opacity: .55; cursor: wait; }
    #status { color: var(--muted); font-size: 11px; }
    .result-pane { min-width: 0; padding: clamp(28px, 5vw, 70px); }
    .empty { max-width: 680px; margin-top: 12vh; padding-top: 24px; border-top: 3px solid var(--green); }
    .empty h2, .answer h2 { margin: 0 0 12px; font: 500 24px/1.25 Georgia, "Songti SC", serif; }
    .empty p { color: var(--muted); line-height: 1.8; }
    .answer { max-width: 900px; }
    .answer-head { display: flex; align-items: start; justify-content: space-between; gap: 20px;
      padding-bottom: 18px; border-bottom: 1px solid var(--line); }
    .badge { padding: 5px 8px; color: var(--green); background: var(--green-soft);
      font-size: 11px; font-weight: 800; white-space: nowrap; }
    .badge.partial { color: var(--amber); background: oklch(94% .045 72); }
    #answerText { margin: 24px 0; white-space: pre-wrap; line-height: 1.85; }
    .metrics { display: grid; grid-template-columns: repeat(3, 1fr); border: 1px solid var(--line); }
    .metric { padding: 16px; border-right: 1px solid var(--line); }
    .metric:last-child { border-right: 0; }
    .metric span { display: block; color: var(--muted); font-size: 11px; }
    .metric strong { display: block; margin-top: 8px; font: 500 24px Georgia, serif; }
    h3 { margin: 32px 0 12px; font-size: 13px; letter-spacing: .08em; }
    .course-list, .evidence-list { display: grid; gap: 8px; }
    .course, .evidence { display: grid; grid-template-columns: 1fr auto; gap: 16px; padding: 13px 0;
      border-bottom: 1px solid var(--line); }
    .course strong, .evidence strong { font-size: 13px; }
    .course span, .evidence span { display: block; margin-top: 5px; color: var(--muted); font-size: 11px; }
    .course b { color: var(--green); font-size: 12px; white-space: nowrap; }
    .evidence { width: 100%; text-align: left; border-width: 0 0 1px; background: transparent; cursor: pointer; }
    .source-detail { margin-top: 18px; padding: 18px; background: var(--panel); border: 1px solid var(--line); }
    .source-detail pre { max-height: 360px; overflow: auto; white-space: pre-wrap;
      font: 12px/1.75 "Microsoft YaHei", sans-serif; }
    .source-detail a { margin-right: 14px; color: var(--green); font-size: 12px; }
    [hidden] { display: none !important; }
    @media (max-width: 840px) {
      main { display: block; } .input-pane { border-right: 0; border-bottom: 1px solid var(--line); }
      .result-pane { padding: 28px 20px; } .empty { margin-top: 24px; }
    }
    @media (max-width: 480px) { .pair, .metrics { grid-template-columns: 1fr; }
      .metric { border-right: 0; border-bottom: 1px solid var(--line); }
      .metric:last-child { border-bottom: 0; } header a { display: none; } }
    @media (prefers-reduced-motion: reduce) { * { scroll-behavior: auto !important; } }
  </style>
</head>
<body>
  <header>
    <div class="brand"><b>SWUFE</b><strong>培养方案审计台</strong></div>
    <a href="/">返回可信问答 →</a>
  </header>
  <main>
    <section class="input-pane">
      <p class="eyebrow">Content-level audit</p>
      <h1>按年级、专业和模块核算。</h1>
      <p class="lede">课程名与代码会匹配培养方案正文。用户填写的学分不会直接采信；结果会列出缺口、专项约束、建议课程、开课学期和原文证据。</p>
      <div class="pair">
        <div><label for="cohort">入学年级</label><select id="cohort"><option value="">请选择</option></select></div>
        <div><label for="semester">当前学期</label><select id="semester"><option value="">不限</option></select></div>
      </div>
      <label for="major">专业 / 方向</label><select id="major"><option value="">先选择年级</option></select>
      <label for="module">核算模块</label><select id="module"><option value="">全部有规则模块</option></select>
      <label for="completed">已修课程</label>
      <textarea id="completed" rows="6" placeholder="每行一个课程代码或课程名&#10;例如：CST132&#10;算法交易"></textarea>
      <small class="hint">未知课程不会计入，并会在结果中提示。</small>
      <label for="question">自然语言问题（可选）</label>
      <textarea id="question" rows="3" maxlength="2000" placeholder="例如：专业选修还差多少分，要修什么，哪个学期修？"></textarea>
      <div class="submit-row"><button id="run" type="button">开始核算</button><span id="status">正在载入目录…</span></div>
    </section>
    <section class="result-pane" aria-live="polite">
      <div id="empty" class="empty"><p class="eyebrow">Audit result</p><h2>等待一次可复核的核算</h2><p>建议先选 2024 级计算机科学与技术专业、专业选修模块，再填写 JavaEE 开发实践和算法交易。</p></div>
      <article id="answer" class="answer" hidden>
        <div class="answer-head"><div><p class="eyebrow">Official curriculum catalog</p><h2 id="planTitle"></h2></div><span id="badge" class="badge"></span></div>
        <div id="answerText"></div><div id="metrics" class="metrics"></div>
        <h3>建议课程与学期</h3><div id="courses" class="course-list"></div>
        <h3>原文证据</h3><div id="evidence" class="evidence-list"></div>
        <article id="source" class="source-detail" hidden></article>
      </article>
    </section>
  </main>
  <script>
    const $ = (id) => document.getElementById(id);
    let catalog = null;
    async function api(path, options = {}) {
      const response = await fetch(path, {headers: {"Content-Type": "application/json"}, ...options});
      const payload = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(payload.detail || `HTTP ${response.status}`);
      return payload;
    }
    function fill(select, values, placeholder) {
      select.replaceChildren(new Option(placeholder, ""));
      for (const value of values) select.append(new Option(value, value));
    }
    function updateMajors() {
      const cohort = $("cohort").value;
      fill($("major"), catalog?.majors_by_cohort?.[cohort] || [], cohort ? "请选择专业" : "先选择年级");
      updateModules();
    }
    function updateModules() {
      const key = `${$("cohort").value}::${$("major").value}`;
      fill($("module"), catalog?.modules_by_plan?.[key] || [], "全部有规则模块");
    }
    async function boot() {
      try {
        catalog = await api("/academic-audit/options");
        fill($("cohort"), catalog.cohorts, "请选择");
        fill($("semester"), ["1","2","3","4","5","6","7","8","S1","S2"], "不限");
        $("status").textContent = `${catalog.plan_count} 个方案 · ${catalog.course_count} 门课程记录`;
      } catch (error) { $("status").textContent = error.message; }
    }
    function courseRow(course) {
      const row = document.createElement("div"); row.className = "course";
      const main = document.createElement("div"); const title = document.createElement("strong");
      title.textContent = `${course.name} · ${course.code}`;
      const meta = document.createElement("span"); meta.textContent = `${course.nature || "课程"} · 第 ${course.semester} 学期`;
      const credit = document.createElement("b"); credit.textContent = `${course.credits} 学分`;
      main.append(title, meta); row.append(main, credit); return row;
    }
    async function loadSource(id) {
      try {
        const item = await api(`/source/${encodeURIComponent(id)}`); const host = $("source"); host.replaceChildren();
        const title = document.createElement("strong"); title.textContent = item.doc_title;
        const meta = document.createElement("p"); meta.textContent = `${item.article} · ${item.cohort}级 · ${item.chunk_id}`;
        const pre = document.createElement("pre"); pre.textContent = item.text;
        const page = document.createElement("a"); page.href = item.page_url; page.target = "_blank"; page.rel = "noreferrer"; page.textContent = "通知页 ↗";
        const file = document.createElement("a"); file.href = item.file_url; file.target = "_blank"; file.rel = "noreferrer"; file.textContent = "附件原文 ↗";
        host.append(title, meta, pre, page, file); host.hidden = false; host.scrollIntoView({block: "nearest"});
      } catch (error) { $("status").textContent = error.message; }
    }
    function render(payload) {
      $("empty").hidden = true; $("answer").hidden = false; $("source").hidden = true;
      $("planTitle").textContent = payload.plan ? `${payload.plan.cohort}级 · ${payload.plan.major}` : "需要补充信息";
      $("badge").textContent = payload.status === "ok" ? "核算完成" : payload.status === "partial" ? "部分结果" : "需要补充";
      $("badge").className = `badge${payload.status === "ok" ? "" : " partial"}`;
      $("answerText").textContent = payload.answer_md;
      const module = payload.modules[0]; const metrics = $("metrics"); metrics.replaceChildren();
      if (module) for (const [label, value] of [["模块要求", module.required_credits ?? "未提取"], ["已匹配", module.completed_credits], ["还差", module.remaining_credits ?? "待确认"]]) {
        const box = document.createElement("div"); box.className = "metric"; const a = document.createElement("span"); a.textContent = label;
        const b = document.createElement("strong"); b.textContent = typeof value === "number" ? `${value} 学分` : value; box.append(a,b); metrics.append(box);
      }
      const courses = $("courses"); courses.replaceChildren(); const suggested = payload.modules.flatMap((item) => item.recommendations || []);
      if (suggested.length) suggested.forEach((item) => courses.append(courseRow(item))); else courses.textContent = "当前结果没有新增课程建议。";
      const evidence = $("evidence"); evidence.replaceChildren(); payload.evidence.forEach((item) => {
        const button = document.createElement("button"); button.type = "button"; button.className = "evidence";
        const main = document.createElement("div"); const title = document.createElement("strong"); title.textContent = item.doc_title;
        const meta = document.createElement("span"); meta.textContent = `${item.article} · ${item.chunk_id}`;
        const open = document.createElement("span"); open.textContent = "查看原文 →"; main.append(title, meta); button.append(main, open);
        button.addEventListener("click", () => loadSource(item.chunk_id)); evidence.append(button);
      });
      if (!payload.evidence.length) evidence.textContent = "当前没有可显示的证据块。";
    }
    $("cohort").addEventListener("change", updateMajors); $("major").addEventListener("change", updateModules);
    $("run").addEventListener("click", async () => {
      if (!$("cohort").value || !$("major").value) { $("status").textContent = "请先选择年级和专业"; return; }
      const button = $("run"); button.disabled = true; $("status").textContent = "正在按培养方案核算…";
      try {
        const completed = $("completed").value.split(/[\n,，、;；]+/).map((v) => v.trim()).filter(Boolean);
        const payload = await api("/academic-audit", {method: "POST", body: JSON.stringify({
          question: $("question").value.trim() || null, cohort: $("cohort").value, major: $("major").value,
          target_module: $("module").value || null, current_semester: $("semester").value || null, completed_courses: completed
        })}); render(payload); $("status").textContent = payload.status === "ok" ? "核算完成" : "请检查结果提示";
      } catch (error) { $("status").textContent = error.message; } finally { button.disabled = false; }
    });
    boot();
  </script>
</body>
</html>
