<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>西财教务助手 · 自带密钥</title>
  <style>
    :root {
      --ink: oklch(28% .025 165);
      --muted: oklch(51% .022 165);
      --paper: oklch(97% .012 105);
      --panel: oklch(99% .006 105);
      --line: oklch(88% .018 145);
      --green: oklch(39% .095 165);
      --green-soft: oklch(93% .035 158);
      --sand: oklch(95% .035 80);
      --amber: oklch(55% .13 65);
      font-family: "Noto Sans SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background: var(--paper);
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; }
    button, input, select, textarea { font: inherit; }
    button, select, input, textarea { outline: none; }
    :focus-visible { outline: 3px solid oklch(69% .11 165 / .42); outline-offset: 2px; }
    .topbar {
      height: 68px; padding: 0 28px; display: flex; align-items: center;
      justify-content: space-between; border-bottom: 1px solid var(--line);
      background: oklch(99% .006 105 / .94);
    }
    .brand { display: flex; align-items: center; gap: 14px; }
    .brand span {
      padding: 7px 9px; color: var(--panel); background: var(--green);
      font-size: 11px; font-weight: 800; letter-spacing: .16em;
    }
    .brand strong { font-family: "Songti SC", SimSun, serif; font-size: 18px; }
    .trust-note { display: flex; align-items: center; gap: 9px; color: var(--muted); font-size: 13px; }
    .trust-note i { width: 8px; height: 8px; border-radius: 50%; background: oklch(64% .14 165); box-shadow: 0 0 0 4px var(--green-soft); }
    .layout { min-height: calc(100vh - 68px); display: grid; grid-template-columns: 300px minmax(420px, 1fr) 340px; }
    .scope-panel, .source-panel { padding: 32px 28px; background: var(--panel); }
    .scope-panel { border-right: 1px solid var(--line); }
    .source-panel { border-left: 1px solid var(--line); }
    .eyebrow { margin: 0 0 13px; color: var(--green); font-size: 11px; font-weight: 800; letter-spacing: .16em; text-transform: uppercase; }
    h1 { margin: 0; font-family: "Songti SC", SimSun, serif; font-size: 31px; line-height: 1.18; font-weight: 500; }
    .intro { margin: 16px 0 26px; color: var(--muted); font-size: 14px; line-height: 1.72; }
    label { display: block; margin: 16px 0 7px; font-size: 12px; font-weight: 700; }
    select, .key-input { width: 100%; padding: 11px 12px; border: 1px solid var(--line); border-radius: 2px; color: var(--ink); background: var(--panel); }
    .key-panel { margin-top: 24px; padding: 17px 0 0; border-top: 1px solid var(--line); }
    .key-label { margin-top: 0; display: flex; align-items: center; justify-content: space-between; }
    .key-label small { padding: 2px 6px; color: var(--green); background: var(--green-soft); font-size: 10px; font-weight: 800; letter-spacing: .08em; }
    .key-row { display: grid; grid-template-columns: minmax(0, 1fr) auto; }
    .key-input { min-width: 0; border-right: 0; }
    .key-toggle { padding: 0 12px; border: 1px solid var(--line); color: var(--green); background: var(--sand); font-size: 12px; font-weight: 800; cursor: pointer; }
    .key-help { margin: 8px 0 0; color: var(--muted); font-size: 11px; line-height: 1.55; }
    .key-state { color: var(--green); font-weight: 700; }
    .boundary { margin-top: 26px; padding: 16px; border-left: 3px solid var(--green); background: var(--green-soft); }
    .boundary strong { font-size: 13px; }
    .boundary p { margin: 7px 0 0; color: oklch(40% .035 165); font-size: 12px; line-height: 1.62; }
    .chat-panel { min-width: 0; display: grid; grid-template-rows: minmax(0, 1fr) auto; }
    .messages { padding: 34px clamp(24px, 5vw, 72px); overflow-y: auto; }
    .message { max-width: 760px; margin: 0 0 22px; padding: 20px 22px; border: 1px solid var(--line); background: var(--panel); box-shadow: 0 4px 18px oklch(25% .03 165 / .035); }
    .message.user { margin-left: auto; border-color: oklch(82% .04 160); background: oklch(95% .025 160); }
    .message p { margin: 9px 0 0; white-space: pre-wrap; line-height: 1.72; font-size: 15px; }
    .message-meta { display: flex; align-items: center; justify-content: space-between; gap: 12px; color: var(--muted); font-size: 11px; }
    .message-meta span { color: var(--ink); font-weight: 800; }
    .message-meta b { padding: 3px 7px; color: var(--green); background: var(--green-soft); font-weight: 700; }
    .message.refused { border-left: 3px solid var(--amber); }
    .message.refused .message-meta b { color: var(--amber); background: oklch(95% .045 70); }
    .composer { margin: 0 clamp(24px, 5vw, 72px) 28px; border: 1px solid oklch(77% .03 160); background: var(--panel); box-shadow: 0 12px 34px oklch(25% .03 165 / .08); }
    .composer textarea { width: 100%; padding: 17px 18px; resize: none; border: 0; color: var(--ink); background: transparent; line-height: 1.5; }
    .composer-foot { padding: 9px 10px 9px 18px; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid oklch(93% .012 145); color: var(--muted); font-size: 11px; }
    .composer button { padding: 9px 22px; border: 0; border-radius: 2px; color: var(--panel); background: var(--green); font-weight: 700; cursor: pointer; }
    .composer button:disabled { opacity: .5; cursor: wait; }
    .source-head { display: flex; justify-content: space-between; }
    .source-head span { color: var(--muted); font-size: 12px; }
    .source-empty { padding: 24px 0; color: var(--muted); font-size: 13px; line-height: 1.7; }
    .source-card { width: 100%; margin: 0 0 10px; padding: 14px; text-align: left; border: 1px solid var(--line); background: var(--panel); cursor: pointer; }
    .source-card:hover { border-color: oklch(67% .07 165); }
    .source-card strong, .source-card span { display: block; }
    .source-card strong { font-size: 13px; line-height: 1.45; }
    .source-card span { margin-top: 6px; color: var(--muted); font-size: 11px; }
    .official-link { display: block; margin: 10px 0; padding: 13px; border: 1px solid var(--line); color: var(--green); text-decoration: none; font-size: 13px; font-weight: 700; }
    .source-detail { margin-top: 20px; padding-top: 18px; border-top: 1px solid var(--line); }
    .source-detail h3 { margin: 0 0 8px; font-size: 15px; }
    .source-detail p { color: var(--muted); font-size: 11px; }
    .source-detail pre { max-height: 360px; overflow: auto; white-space: pre-wrap; font: 12px/1.7 "Microsoft YaHei", sans-serif; }
    .source-detail a { margin-right: 12px; color: var(--green); font-size: 12px; }
    .toast { position: fixed; left: 50%; bottom: 22px; transform: translate(-50%, 20px); padding: 10px 16px; color: var(--panel); background: var(--ink); opacity: 0; pointer-events: none; transition: transform .2s, opacity .2s; }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }
    @media (max-width: 1080px) {
      .layout { grid-template-columns: 250px 1fr; }
      .source-panel { grid-column: 1 / -1; border-left: 0; border-top: 1px solid var(--line); }
    }
    @media (max-width: 720px) {
      .topbar { padding: 0 16px; }
      .trust-note { display: none; }
      .layout { display: block; }
      .scope-panel { padding: 18px 20px; border-right: 0; border-bottom: 1px solid var(--line); }
      .scope-panel h1, .scope-panel .intro, .boundary { display: none; }
      .key-panel { margin-top: 18px; }
      .messages { min-height: 46vh; padding: 22px 16px; }
      .composer { margin: 0 16px 18px; }
      .source-panel { padding: 24px 20px; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand"><span>SWUFE</span><strong>西财教务助手</strong></div>
    <div class="trust-note"><i></i>学校事实仅使用官方材料</div>
  </header>

  <main class="layout">
    <aside class="scope-panel">
      <p class="eyebrow">可信范围</p>
      <h1>自然聊天，<br>学校事实可追溯。</h1>
      <p class="intro">普通问题直接交流；培养方案、选课、推免与校内事实自动进入可信检索。</p>

      <label for="college">学院（可选）</label>
      <select id="college"><option value="">自动识别</option></select>
      <label for="cohort">入学年级（可选）</label>
      <select id="cohort"><option value="">自动识别</option></select>

      <section class="key-panel" aria-labelledby="keyLabel">
        <label id="keyLabel" class="key-label" for="apiKey">
          <span>DeepSeek API Key</span><small>临时</small>
        </label>
        <div class="key-row">
          <input id="apiKey" class="key-input" type="password" placeholder="sk-…"
                 autocomplete="new-password" autocapitalize="off" spellcheck="false"
                 aria-describedby="keyHelp">
          <button id="toggleKey" class="key-toggle" type="button"
                  aria-controls="apiKey" aria-pressed="false">显示</button>
        </div>
        <p id="keyHelp" class="key-help"><span id="keyState">未填写：使用本地生成</span><br>仅随本次问答发送，不写入配置、日志或浏览器存储；刷新即清除。</p>
      </section>

      <div class="boundary">
        <strong>回答边界</strong>
        <p>知识库没有证据时会明确拒答，不会把学校事实交给通用模型猜测。密钥只改变生成客户端，不改变门禁。</p>
      </div>
    </aside>

    <section class="chat-panel" aria-label="对话区">
      <div id="messages" class="messages" aria-live="polite">
        <article class="message assistant welcome">
          <div class="message-meta"><span>教务助手</span><b>准备就绪</b></div>
          <p>可以问：2024级计算机科学与技术专业的专业选修最低需要多少学分？填写临时密钥后，将使用真实 DeepSeek 生成并保留同样的引用校验。</p>
        </article>
      </div>
      <form id="chatForm" class="composer">
        <textarea id="question" rows="3" maxlength="1000" placeholder="输入问题；Enter 发送，Shift+Enter 换行" required></textarea>
        <div class="composer-foot"><span id="status">正在连接…</span><button type="submit">发送</button></div>
      </form>
    </section>

    <aside class="source-panel" aria-label="原文与链接">
      <div class="source-head"><p class="eyebrow">官方来源</p><span id="sourceCount">0</span></div>
      <div id="sources" class="source-empty">回答中的引用与官方查询入口会显示在这里。</div>
      <article id="sourceDetail" class="source-detail" hidden></article>
    </aside>
  </main>
  <div id="toast" class="toast" role="status"></div>

  <script>
    const $ = (id) => document.getElementById(id);
    const sessionId = sessionStorage.getItem("swufe-session") || crypto.randomUUID();
    sessionStorage.setItem("swufe-session", sessionId);

    function toast(message) {
      $("toast").textContent = message;
      $("toast").classList.add("show");
      window.setTimeout(() => $("toast").classList.remove("show"), 2400);
    }

    async function api(path, options = {}) {
      const headers = { "Content-Type": "application/json", ...(options.headers || {}) };
      const response = await fetch(path, { ...options, headers });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(payload.detail || `HTTP ${response.status}`);
      return payload;
    }

    function addMessage(role, text, mode = "", refused = false, live = false) {
      const article = document.createElement("article");
      article.className = `message ${role}${refused ? " refused" : ""}`;
      const meta = document.createElement("div");
      meta.className = "message-meta";
      const name = document.createElement("span");
      name.textContent = role === "user" ? "你" : "教务助手";
      const badge = document.createElement("b");
      badge.textContent = mode === "school_rag"
        ? (refused ? "证据不足" : (live ? "真实模型 · 可信 RAG" : "本地 · 可信 RAG"))
        : (mode === "general_chat" ? (live ? "真实模型" : "本地对话") : "已发送");
      meta.append(name, badge);
      const body = document.createElement("p");
      body.textContent = text;
      article.append(meta, body);
      $("messages").append(article);
      article.scrollIntoView({ behavior: "smooth", block: "end" });
    }

    function sourceButton(citation) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "source-card";
      const title = document.createElement("strong");
      title.textContent = `[${citation.marker}] ${citation.doc_title}`;
      const meta = document.createElement("span");
      meta.textContent = `${citation.article} · ${citation.chunk_id}`;
      button.append(title, meta);
      button.addEventListener("click", () => loadSource(citation.chunk_id));
      return button;
    }

    function officialLink(link) {
      const anchor = document.createElement("a");
      anchor.className = "official-link";
      anchor.href = link.page_url;
      anchor.target = "_blank";
      anchor.rel = "noreferrer";
      anchor.textContent = `${link.title} →`;
      return anchor;
    }

    function renderSources(payload) {
      const host = $("sources");
      const items = [
        ...(payload.citations || []).map(sourceButton),
        ...(payload.official_links || []).map(officialLink),
      ];
      host.className = items.length ? "" : "source-empty";
      host.replaceChildren(...(items.length ? items : [document.createTextNode("本轮没有引用或查询入口。")]));
      $("sourceCount").textContent = String(items.length);
      $("sourceDetail").hidden = true;
    }

    async function loadSource(chunkId) {
      try {
        const source = await api(`/source/${encodeURIComponent(chunkId)}`);
        const detail = $("sourceDetail");
        detail.replaceChildren();
        const title = document.createElement("h3");
        title.textContent = source.doc_title;
        const meta = document.createElement("p");
        meta.textContent = `${source.article} · ${source.college} · ${source.cohort}`;
        const text = document.createElement("pre");
        text.textContent = source.text;
        const page = document.createElement("a");
        page.href = source.page_url; page.target = "_blank"; page.rel = "noreferrer"; page.textContent = "通知页 →";
        const file = document.createElement("a");
        file.href = source.file_url; file.target = "_blank"; file.rel = "noreferrer"; file.textContent = "附件原文 →";
        detail.append(title, meta, text, page, file);
        detail.hidden = false;
      } catch (error) { toast(error.message); }
    }

    async function boot() {
      try {
        const options = await api("/options");
        for (const value of options.colleges || []) $("college").append(new Option(value, value));
        for (const value of options.cohorts || []) $("cohort").append(new Option(value, value));
        $("status").textContent = `${options.chunk_count} 个知识块 · ${options.mode}`;
      } catch (error) { $("status").textContent = error.message; }
    }

    $("apiKey").addEventListener("input", () => {
      const ready = Boolean($("apiKey").value.trim());
      $("keyState").textContent = ready ? "已填写：使用真实模型" : "未填写：使用本地生成";
      $("keyState").classList.toggle("key-state", ready);
    });

    $("toggleKey").addEventListener("click", () => {
      const reveal = $("apiKey").type === "password";
      $("apiKey").type = reveal ? "text" : "password";
      $("toggleKey").textContent = reveal ? "隐藏" : "显示";
      $("toggleKey").setAttribute("aria-pressed", String(reveal));
      $("apiKey").focus();
    });

    $("chatForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const question = $("question").value.trim();
      if (!question) return;
      const apiKey = $("apiKey").value.trim();
      addMessage("user", question);
      $("question").value = "";
      const button = event.currentTarget.querySelector("button[type='submit']");
      button.disabled = true;
      $("status").textContent = apiKey ? "真实模型生成与证据校验中…" : "本地生成与证据校验中…";
      try {
        const payload = await api("/ask", {
          method: "POST",
          headers: apiKey ? { "X-LLM-API-Key": apiKey } : {},
          body: JSON.stringify({
            question,
            college: $("college").value || null,
            cohort: $("cohort").value || null,
            session_id: sessionId,
          }),
        });
        addMessage("assistant", payload.answer_md, payload.mode, payload.refused, Boolean(apiKey));
        renderSources(payload);
        $("status").textContent = `${payload.mode === "school_rag" ? "学校事实" : "普通对话"} · ${payload.latency_ms} ms`;
      } catch (error) {
        toast(error.message);
        $("status").textContent = "请求失败；密钥未保存";
      } finally {
        button.disabled = false;
        $("question").focus();
      }
    });

    $("question").addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        $("chatForm").requestSubmit();
      }
    });

    window.addEventListener("pagehide", () => { $("apiKey").value = ""; });
    boot();
  </script>
</body>
</html>
