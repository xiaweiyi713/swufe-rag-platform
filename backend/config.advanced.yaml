paths:
  chunks: data/chunks.jsonl
  artifacts: artifacts

retrieval:
  embed_model: BAAI/bge-large-zh-v1.5
  # Exact public model snapshot used by reproducible index builds.
  embed_revision: 79e7739b6ab944e86d6171e44d24c997fc1e0116
  query_prefix: "为这个句子生成表示以用于检索相关文章："
  top_k: 5
  # Keep the full evidence window: some policy questions need an
  # authoritative curriculum-page chunk that is not in a smaller window.
  candidate_k: 50
  use_bm25: true
  use_reranker: true
  rerank_model: BAAI/bge-reranker-base
  dense_weight: 0.35
  lexical_weight: 0.25
  rerank_weight: 0.35
  rank_prior_weight: 0.05
  mmr_lambda: 0.88

generation:
  llm: deepseek-chat
  temperature: 0
  general_temperature: 0.7
  refuse_th: 0.35
  max_retries: 2
  request_timeout_seconds: 60
  byok_max_retries: 0
  byok_request_timeout_seconds: 30
  byok_web_fallback_timeout_seconds: 15
  max_context_chars: 7000
  max_chunk_chars: 1600
