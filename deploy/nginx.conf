# swufe-rag 反向代理配置
#
# 关键点(踩过的坑都在注释里):
# 1. /ask/stream 是 NDJSON 流式端点,必须关闭 proxy_buffering,
#    否则 Nginx 会把整个响应缓冲完再吐给客户端,iOS 端的逐字渲染
#    会退化成"卡住十几秒然后整段蹦出来"。
# 2. LLM 链路实测 6~15 秒,默认 60s 超时不够,统一放宽到 180s。
# 3. X-Real-IP 必须设置:后端限流依赖它识别真实客户端,
#    而且后端只信任 X-Real-IP / XFF 末项,客户端伪造无效。
# 4. iOS App 走 HTTPS(ATS 要求),证书路径见 deploy/README.md。

# Docker 内嵌 DNS。用变量 + resolver 让 upstream 在**请求时**解析,
# 而不是启动时:否则 app 容器还在重启中,nginx 会因为解析不到主机名而
# 直接启动失败,两个容器互相拖死。valid=10s 让 app 重建后能快速跟上。
resolver 127.0.0.11 valid=10s ipv6=off;
map $host $swufe_upstream {
    default "app:8000";
}

# Nginx 层限流作为第一道闸门(后端还有一层 per-IP 限流兜底)。
# 10m 的共享内存约可跟踪 16 万个 IP。
limit_req_zone $binary_remote_addr zone=swufe_ask:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=swufe_general:10m rate=120r/m;
limit_conn_zone $binary_remote_addr zone=swufe_conn:10m;

# ---------------------------------------------------------------------------
# HTTP:仅用于 ACME 续签与跳转 HTTPS
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # certbot webroot 校验
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 容器编排的健康检查走 HTTP,不强制跳转
    location = /healthz {
        proxy_pass http://$swufe_upstream;
        access_log off;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS 主服务
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # 请求体上限:本服务只收 JSON 问题文本(后端限 2000 字符),无上传。
    client_max_body_size 64k;
    limit_conn swufe_conn 16;

    # 代理通用设置
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";

    # ---- 流式问答:必须关缓冲,否则前端拿不到增量 ----
    location = /ask/stream {
        limit_req zone=swufe_ask burst=10 nodelay;
        proxy_pass http://$swufe_upstream;

        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        gzip off;                     # gzip 会重新引入缓冲

        proxy_connect_timeout 10s;
        proxy_send_timeout    180s;
        proxy_read_timeout    180s;   # LLM 链路 6~15s,留足余量
    }

    # ---- 同步问答:LLM 可能耗时十几秒 ----
    location = /ask {
        limit_req zone=swufe_ask burst=10 nodelay;
        proxy_pass http://$swufe_upstream;

        proxy_connect_timeout 10s;
        proxy_send_timeout    180s;
        proxy_read_timeout    180s;
    }

    # ---- 学业审计:结构化计算,较快 ----
    location = /academic-audit {
        limit_req zone=swufe_ask burst=5 nodelay;
        proxy_pass http://$swufe_upstream;
        proxy_read_timeout 60s;
    }

    # ---- 探针:不限流、不记日志 ----
    location = /healthz {
        proxy_pass http://$swufe_upstream;
        access_log off;
    }
    location = /readyz {
        proxy_pass http://$swufe_upstream;
        access_log off;
    }

    # ---- 其余只读接口(/options、/source/*、静态页)----
    location / {
        limit_req zone=swufe_general burst=40 nodelay;
        proxy_pass http://$swufe_upstream;
        proxy_read_timeout 60s;

        gzip on;
        gzip_types application/json text/plain text/css application/javascript;
        gzip_min_length 1024;
    }
}
